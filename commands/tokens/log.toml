description = "Manually log token usage for a specific session."
prompt = """
请使用 node ${extensionPath:-.}/scripts/log_token.cjs {{args}} 记录我的 Token，并确认记录是否成功，总结该条记录的消耗。

例如: /tokens:log <sid> <title> <model> <prompt> <completion>

脚本输出：
!{node ${extensionPath:-.}/scripts/log_token.cjs {{args}}}
"""
